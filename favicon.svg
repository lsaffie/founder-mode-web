<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Founder Mode">
  <defs>
    <!-- Obsidian tile: warm charcoal into near-black -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15140f"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <!-- Champagne orb: top-left light source, falling off to deep gold -->
    <radialGradient id="orb" cx="0.38" cy="0.32" r="0.85">
      <stop offset="0"    stop-color="#f7ecd2"/>
      <stop offset="0.32" stop-color="#e6c98a"/>
      <stop offset="0.70" stop-color="#c9a45c"/>
      <stop offset="1"    stop-color="#8f7235"/>
    </radialGradient>
    <!-- Soft gold halo (layered, not blurred — robust as a favicon) -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#c9a45c" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#c9a45c" stop-opacity="0.14"/>
      <stop offset="1"   stop-color="#c9a45c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tile + gold hairline frame (the site's signature border) -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="url(#tile)"/>
  <rect x="1.75" y="1.75" width="28.5" height="28.5" rx="6.4"
        fill="none" stroke="#c9a45c" stroke-opacity="0.45" stroke-width="0.7"/>

  <!-- Halo -->
  <circle cx="16" cy="16" r="11" fill="url(#halo)"/>

  <!-- Thin signet ring — a quiet nod to "by application only" -->
  <circle cx="16" cy="16" r="8.4" fill="none"
          stroke="#c9a45c" stroke-opacity="0.5" stroke-width="0.75"/>

  <!-- The champagne dot -->
  <circle cx="16" cy="16" r="5.4" fill="url(#orb)"/>
  <!-- Specular highlight -->
  <ellipse cx="14.1" cy="13.9" rx="1.9" ry="1.3" fill="#fff7e6" opacity="0.55"/>
</svg>
